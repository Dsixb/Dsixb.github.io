<!DOCTYPE html>

      <button onclick="openPage('structure')">STRUCTURE</button>
      <button onclick="openPage('subdivisions')">SUBDIVISIONS</button>
      <button onclick="openPage('members')">MEMBERS</button>

      <button onclick="openPage('logs')">LOGS</button>
      <button onclick="openPage('classified')">CLASSIFIED</button>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <div id="philosophy" class="page active"></div>
      <div id="structure" class="page"></div>
      <div id="subdivisions" class="page"></div>
      <div id="members" class="page"></div>
      <div id="manual" class="page"></div>

      <div id="classified" class="page locked">
        <h2>ACCESS DENIED</h2>
        <p>CLASSIFIED NODE REQUIRES AUTHORIZATION</p>
